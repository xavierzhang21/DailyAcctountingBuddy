<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Personal Accounting</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="container">
<h1>Personal Accounting</h1>

<div class="amount">
  <input id="price" type="text" inputmode="decimal" placeholder="0.00">
</div>

<button id="addButton" class="primary" onclick="add()">Add Record</button>

<div class="card">
  <select id="type" class="selector">
    <option value="out">Expense</option>
    <option value="in">Income</option>
  </select>

  <select id="category" class="selector">
    <option value="Supermarket">Supermarket</option>
    <option value="Restaurant">Restaurant</option>
    <option value="Online Shopping">Online Shopping</option>
    <option value="Lunch">Lunch</option>
    <option value="Electricity">Electricity</option>
    <option value="Internet">Internet</option>
    <option value="Mortgage">Mortgage</option>
    <option value="Insurance">Insurance</option>
    <option value="Pets">Pets</option>
    <option value="Travel">Travel</option>
    <option value="Other">Other</option>
  </select>

  <input id="note" class="note" placeholder="Note (optional)">
  <!-- Authentication removed: app now uses a single shared records collection. -->
  <button class="secondary" onclick="exportCSV()">Export CSV</button>
  <button class="secondary" onclick="importCSV()">Import CSV</button>
  <button class="secondary" onclick="clearAll()">Clear All History</button>
  <input id="csvFile" type="file" accept=".csv,text/csv" style="display:none">
</div>

<div class="card">
  <div class="stats">
    <div class="stat">
      <div class="stat-title">Income</div>
      <div id="income" class="stat-value income">0.00</div>
    </div>
    <div class="stat">
      <div class="stat-title">Expense</div>
      <div id="expense" class="stat-value expense">0.00</div>
    </div>
    <div class="stat">
      <div class="stat-title">Balance</div>
      <div id="balance" class="stat-value">0.00</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="chart"><canvas id="trend"></canvas></div>
</div>

<div class="card">
  <div class="chart"><canvas id="pie"></canvas></div>
</div>

<div id="records"></div>
</div>

<script src="script.js" type="module"></script>
</body>
</html>
